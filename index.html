<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<title>Provance Orders</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f4f6f9;
}
.screen{display:none;padding:20px}
.active{display:block}
.topbar{font-size:22px;font-weight:700;margin-bottom:20px}

.button{
  width:100%;padding:16px;margin-bottom:12px;
  border-radius:14px;border:none;
  font-size:18px;font-weight:500;cursor:pointer
}
.button:active{transform:scale(.97)}
.primary{background:#111;color:#fff}
.primary:disabled{background:#999}
.secondary{background:#fff;border:1px solid #ddd}

.product-row{
  background:#fff;padding:16px;border-radius:14px;
  margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.05)
}
.product-row.active{background:#e6f2ff;border:2px solid #b3d7ff}
.product-title{font-size:18px;font-weight:600;margin-bottom:12px}

.controls-line{display:flex;justify-content:space-between;align-items:center}
.controls{display:flex;gap:14px;align-items:center}

.qty-btn{
  width:46px;height:46px;font-size:24px;
  border-radius:12px;border:none;background:#111;color:#fff
}
.qty-value{font-size:20px;min-width:30px;text-align:center}
.pack{font-size:18px;font-weight:600}

input[type="date"]{
  width:100%;padding:14px;font-size:18px;
  border-radius:12px;border:1px solid #ccc;
  margin:12px 0 20px
}

.back{background:none;border:none;font-size:16px;margin-bottom:15px;color:#555}

.divider{height:1px;background:#ddd;margin:20px 0}
.review-row{display:flex;justify-content:space-between;margin-bottom:8px}
.total-line{display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-bottom:15px}
.order-status{font-weight:600;margin-bottom:20px}

.toast{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%) translateY(-120%);
  background:#111;color:#fff;
  padding:20px;border-radius:18px;
  width:90%;max-width:420px;
  text-align:center;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  opacity:0;transition:.35s;z-index:999
}
.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1
}
</style>
</head>
<body>

<div id="screen1" class="screen active">
  <div class="topbar">🐾 Начать охоту на:</div>
  <div id="suppliers"></div>
</div>

<div id="screen2" class="screen">
  <button class="back" onclick="goTo(1)">← Назад</button>
  <div id="supplierInfo"></div>
  <div>Заказ на:</div>
  <input type="date" id="orderDate" autocomplete="off">
  <button class="button primary" onclick="goToProducts()">Выбрать добычу</button>
</div>

<div id="screen3" class="screen">
  <button class="back" onclick="goTo(2)">← Назад</button>
  <div id="products"></div>
  <button class="button primary" onclick="openReview()">Обнюхать</button>
</div>

<div id="screen4" class="screen">
  <button class="back" onclick="goTo(3)">← Назад</button>
  <div class="topbar">Проверка заказа</div>
  <div id="reviewList"></div>
  <div class="divider"></div>
  <div class="total-line">
    <span>Сумма заказа</span>
    <span id="totalSum">0 ₽</span>
  </div>
  <div id="orderStatus" class="order-status"></div>
  <button id="submitBtn" class="button primary" onclick="submitOrder()">Сделать заказ</button>
</div>

<div id="toast" class="toast"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzMi8su6DRvZtTmHJY6guY9R10KRy_E_j_VPhlsWIgGfiZXWaxJeYwNtpn0_CYDGU7Seg/exec";
let selectedSupplier=null;
let productsData=[];
let minOrderSum=0;

/* Навигация */
function goTo(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen'+n).classList.add('active');
}

/* Toast */
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),4500);
}

/* Поставщики */
fetch(`${API}?action=getSuppliers`)
.then(r=>r.json())
.then(data=>{
  const c=document.getElementById('suppliers');
  data.forEach(name=>{
    const b=document.createElement('button');
    b.className="button secondary";
    b.textContent=name;
    b.onclick=()=>selectSupplier(name);
    c.appendChild(b);
  });
});

/* Выбор поставщика */
function selectSupplier(name){
  selectedSupplier=name;
  fetch(`${API}?action=getSupplierInfo&name=${encodeURIComponent(name)}`)
  .then(r=>r.json())
  .then(info=>{
    minOrderSum=Number(info.minSum)||0;
    document.getElementById('supplierInfo').innerHTML=`
      <div class="product-row">
        <b>${name}</b><br><br>
        Минимальный заказ: ${minOrderSum} ₽<br>
        Приём заказов: ${info.orderTime}<br>
        Доставка: ${info.deliveryTime}
      </div>`;
    goTo(2);
  });
}

/* Загрузка товаров */
function goToProducts(){
  const date=document.getElementById('orderDate').value;
  if(!date){showToast("Укажите дату");return;}

  fetch(`${API}?action=getProducts&name=${encodeURIComponent(selectedSupplier)}`)
  .then(r=>r.json())
  .then(data=>{
    productsData=data;
    const c=document.getElementById('products');
    c.innerHTML="";
    data.forEach((p,i)=>{
      c.innerHTML+=`
      <div class="product-row" id="row_${i}">
        <div class="product-title">${p.name}</div>
        <div class="controls-line">
          <div class="controls">
            <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
            <span id="qty_${i}" class="qty-value">0</span>
            <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
          </div>
          <div class="pack">${p.pack}</div>
        </div>
      </div>`;
    });
    goTo(3);
  });
}

/* Изменение количества */
function changeQty(i,d){
  const el=document.getElementById('qty_'+i);
  let v=parseInt(el.textContent)+d;
  if(v<0)v=0;
  el.textContent=v;
  document.getElementById('row_'+i)
    .classList.toggle('active',v>0);
}

/* Проверка */
function openReview(){
  const list=document.getElementById('reviewList');
  list.innerHTML="";
  let total=0;

  productsData.forEach((p,i)=>{
    const qty=parseInt(document.getElementById('qty_'+i).textContent);
    if(qty>0){
      const sum=qty*(Number(p.price)||0);
      total+=sum;
      list.innerHTML+=`
      <div class="review-row">
        <span>${p.name} × ${qty}</span>
        <span>${sum} ₽</span>
      </div>`;
    }
  });

  document.getElementById('totalSum').textContent=total+" ₽";

  const status=document.getElementById('orderStatus');
  const btn=document.getElementById('submitBtn');

  if(total>=minOrderSum){
    status.innerHTML="✅ Всё окей, заказывай!";
    status.style.color="green";
    btn.disabled=false;
  }else{
    status.innerHTML="❌ Минимальная сумма заказа не набрана.";
    status.style.color="red";
    btn.disabled=true;
    showToast("Минимальная сумма не набрана");
  }

  goTo(4);
}

/* Отправка */
function submitOrder(){

  const btn = document.getElementById('submitBtn');
  if(btn.disabled){
    showToast("Сумма меньше минимальной");
    return;
  }

  const dateRaw = document.getElementById('orderDate').value;
  const date = new Date(dateRaw);
  const formatted = date.toLocaleDateString('ru-RU', {
    day:'2-digit',
    month:'2-digit'
  });

  let text = `${selectedSupplier}\n`;
  text += `Заказ на ${formatted}\n`;

  productsData.forEach((p,i)=>{
    const qty = parseInt(document.getElementById('qty_'+i).textContent);
    if(qty>0){
      text += `${p.name} — ${qty}\n`;
    }
  });

  // Копирование в буфер
  navigator.clipboard.writeText(text);

  // Отправка в Google Sheets
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      text:text,
      supplier:selectedSupplier,
      date:formatted
    })
  });

  showToast("🐺 Волчок выходит на охоту. Отправь заказ в ТГ!");

  goTo(1);
}


/* Сброс даты */
window.addEventListener("load",()=>{
  document.getElementById("orderDate").value="";
});

</script>
</body>
</html>
