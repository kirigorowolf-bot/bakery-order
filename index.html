<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<title>Provance Orders</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f6f9;}
.screen{display:none;padding:20px}
.active{display:block}
.topbar{font-size:22px;font-weight:700;margin-bottom:20px}

.button{width:100%;padding:16px;margin-bottom:12px;border-radius:14px;border:none;font-size:18px;font-weight:500;cursor:pointer}
.button:active{transform:scale(.97)}
.primary{background:#111;color:#fff}
.primary:disabled{background:#999}
.secondary{background:#fff;border:1px solid #ddd}

.product-row{background:#fff;padding:16px;border-radius:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
.product-row.active{background:#e6f2ff;border:2px solid #b3d7ff}
.product-title{font-size:18px;font-weight:600;margin-bottom:12px}

.controls-line{display:flex;justify-content:space-between;align-items:center}
.controls{display:flex;gap:14px;align-items:center}

.qty-btn{width:46px;height:46px;font-size:24px;border-radius:12px;border:none;background:#111;color:#fff}
.qty-value{font-size:20px;min-width:30px;text-align:center}
.pack{font-size:18px;font-weight:600}

input[type="date"]{width:100%;padding:14px;font-size:18px;border-radius:12px;border:1px solid #ccc;margin:12px 0 20px}
.back{background:none;border:none;font-size:16px;margin-bottom:15px;color:#555}

.divider{height:1px;background:#ddd;margin:20px 0}

/* ===== ФИКС 3/4 - 1/4 ===== */
.review-row{
  display:flex;
  margin-bottom:8px;
}
.review-name{
  width:75%;
  word-break:break-word;
}
.review-price{
  width:25%;
  text-align:right;
  white-space:nowrap;
}

.total-line{display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-bottom:15px}
.order-status{font-weight:600;margin-bottom:20px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120%);
background:#111;color:#fff;padding:20px;border-radius:18px;width:90%;max-width:420px;
text-align:center;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);
opacity:0;transition:.35s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Европа Маркет */
.section-block{margin-bottom:14px;border-radius:16px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.05)}
.section-header{
  background:#c0ddfc;color:#111;padding:18px;font-weight:600;font-size:18px;
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;
}
.section-arrow{transition:.25s}
.section-arrow.rotate{transform:rotate(180deg)}
.section-products{display:none;background:#f9fafb;padding:12px}
.section-products.open{display:block}
</style>
</head>
<body>

<div id="screen1" class="screen active">
  <div class="topbar">🐾 Начать охоту на:</div>
  <div id="suppliers"></div>
</div>

<div id="screen2" class="screen">
  <button class="back" onclick="goTo(1)">← Назад</button>
  <div id="supplierInfo"></div>
  <div>Заказ на:</div>
  <input type="date" id="orderDate">
  <button class="button primary" onclick="goToProducts()">Выбрать добычу</button>
</div>

<div id="screen3" class="screen">
  <button class="back" onclick="goTo(2)">← Назад</button>
  <div id="products"></div>
  <button class="button primary" onclick="openReview()">Обнюхать</button>
</div>

<div id="screen4" class="screen">
  <button class="back" onclick="goTo(3)">← Назад</button>
  <div class="topbar">Проверка заказа</div>
  <div id="reviewList"></div>
  <div class="divider"></div>
  <div class="total-line">
    <span>Сумма заказа</span>
    <span id="totalSum">0 ₽</span>
  </div>
  <div id="orderStatus" class="order-status"></div>
  <button id="submitBtn" class="button primary" onclick="submitOrder()">Сделать заказ</button>
</div>

<div id="toast" class="toast"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzMi8su6DRvZtTmHJY6guY9R10KRy_E_j_VPhlsWIgGfiZXWaxJeYwNtpn0_CYDGU7Seg/exec";
let selectedSupplier=null;
let productsData=[];
let minOrderSum=0;

function goTo(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen'+n).classList.add('active');
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),4500);
}

fetch(`${API}?action=getSuppliers`)
.then(r=>r.json())
.then(data=>{
  const c=document.getElementById('suppliers');
  data.forEach(name=>{
    const b=document.createElement('button');
    b.className="button secondary";
    b.textContent=name;
    b.onclick=()=>selectSupplier(name);
    c.appendChild(b);
  });
});

function selectSupplier(name){
  selectedSupplier=name;
  fetch(`${API}?action=getSupplierInfo&name=${encodeURIComponent(name)}`)
  .then(r=>r.json())
  .then(info=>{
    minOrderSum=Number(info.minSum)||0;
    document.getElementById('supplierInfo').innerHTML=`
      <div class="product-row">
        <b>${name}</b><br><br>
        Минимальный заказ: ${minOrderSum} ₽<br>
        Приём заказов: ${info.orderTime}<br>
        Доставка: ${info.deliveryTime}
      </div>`;
    goTo(2);
  });
}

function goToProducts(){
  const date=document.getElementById('orderDate').value;
  if(!date){showToast("Укажите дату");return;}

  fetch(`${API}?action=getProducts&name=${encodeURIComponent(selectedSupplier)}`)
  .then(r=>r.json())
  .then(data=>{
    productsData=data;
    const container=document.getElementById('products');
    container.innerHTML="";

    if(selectedSupplier!=="Европа Маркет"){
      data.forEach((p,i)=>container.innerHTML+=renderProduct(p,i));
      goTo(3);
      return;
    }

    let currentSection=null;
    let sectionIndex=0;

    data.forEach((p,i)=>{
      if(!p.pack){
        currentSection=`section_${sectionIndex++}`;
        container.innerHTML+=`
          <div class="section-block">
            <div class="section-header" onclick="toggleSection('${currentSection}',this)">
              <span>${p.name}</span>
              <span class="section-arrow">▼</span>
            </div>
            <div class="section-products" id="${currentSection}"></div>
          </div>`;
      }else{
        if(currentSection){
          document.getElementById(currentSection).innerHTML+=renderProduct(p,i);
        }
      }
    });

    goTo(3);
  });
}

function renderProduct(p,i){
  return `
  <div class="product-row" id="row_${i}">
    <div class="product-title">${p.name}</div>
    <div class="controls-line">
      <div class="controls">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span id="qty_${i}" class="qty-value">0</span>
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      </div>
      <div class="pack">${p.pack||""}</div>
    </div>
  </div>`;
}

function toggleSection(id,header){
  document.getElementById(id).classList.toggle("open");
  header.querySelector(".section-arrow").classList.toggle("rotate");
}

function changeQty(i,d){
  const el=document.getElementById('qty_'+i);
  let v=parseInt(el.textContent)+d;
  if(v<0)v=0;
  el.textContent=v;
  document.getElementById('row_'+i).classList.toggle('active',v>0);
}

/* ===== ПРОВЕРКА ===== */
function openReview(){

  const list=document.getElementById('reviewList');
  list.innerHTML="";

  let total=0;
  let totalUnits=0;

  productsData.forEach((p,i)=>{
    if(!p.pack) return; // игнорируем заголовки разделов

    const qty=parseInt(document.getElementById('qty_'+i)?.textContent||0);
    if(qty>0){
      const sum=qty*(Number(p.price)||0);
      total+=sum;
      totalUnits+=qty;

      list.innerHTML+=`
        <div class="review-row">
          <div class="review-name">${p.name} × ${qty}</div>
          <div class="review-price">${sum.toFixed(2)} ₽</div>
        </div>`;
    }
  });

  let finalTotal=total;

  /* ===== СИРОПЫ ===== */
  if(selectedSupplier==="Сиропы"){

    if(totalUnits<12){
      finalTotal=total+300;
    }

    document.getElementById('totalSum').textContent=total.toFixed(2)+" ₽";

    list.innerHTML+=`<div class="divider"></div>`;

    list.innerHTML+=`
      <div class="review-row">
        <div class="review-name"><b>Количество бутылок</b></div>
        <div class="review-price"><b>${totalUnits}</b></div>
      </div>`;

    if(totalUnits<12){
      list.innerHTML+=`
        <div class="review-row">
          <div class="review-name">Стоимость доставки</div>
          <div class="review-price">+300 ₽</div>
        </div>
        <div style="font-size:14px;color:#555;margin-bottom:10px">
          Бесплатная доставка от 12 бутылок
        </div>
        <div class="review-row">
          <div class="review-name"><b>Сумма заказа с доставкой</b></div>
          <div class="review-price"><b>${finalTotal.toFixed(2)} ₽</b></div>
        </div>`;
    }

  }else{
    document.getElementById('totalSum').textContent=total.toFixed(2)+" ₽";
  }

  const status=document.getElementById('orderStatus');
  const btn=document.getElementById('submitBtn');

  if(finalTotal>=minOrderSum){
    status.innerHTML="✅ Всё окей, заказывай!";
    status.style.color="green";
    btn.disabled=false;
  }else{
    const diff=(minOrderSum-finalTotal).toFixed(2);
    status.innerHTML=`❌ Минимальная сумма заказа ${minOrderSum} ₽ не набрана. Добавь товар на сумму ${diff} ₽.`;
    status.style.color="red";
    btn.disabled=true;
  }

  goTo(4);
}

function submitOrder(){
  const btn=document.getElementById('submitBtn');
  if(btn.disabled){showToast("Сумма меньше минимальной");return;}

  const dateRaw=document.getElementById('orderDate').value;
  const date=new Date(dateRaw);
  const formatted=date.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});

  let text=`${selectedSupplier}\nЗаказ на ${formatted}\n`;

  productsData.forEach((p,i)=>{
    if(!p.pack) return;
    const qty=parseInt(document.getElementById('qty_'+i)?.textContent||0);
    if(qty>0) text+=`${p.name} — ${qty}\n`;
  });

  navigator.clipboard.writeText(text);

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      text:text,
      supplier:selectedSupplier,
      date:formatted
    })
  });

  showToast("🐺 Волчок выходит на охоту. Отправь заказ в ТГ!");
  goTo(1);
}

window.addEventListener("load",()=>{
  document.getElementById("orderDate").value="";
});
</script>
</body>
</html>
